<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>InkLog</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-container">
        <!-- 네비게이션 레일 -->
        <nav class="nav-rail">
            <div class="nav-items">
                <button class="nav-item active" id="openEditor" title="편집기 열기">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
                        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
                    </svg>
                    <span>Archive</span>
                </button>
            </div>
            <div class="nav-footer"></div>
        </nav>

        <!-- 에디터 패널 (챕터 목록) -->
        <div class="editor-panel">
            <header class="panel-header">
                <h1>InkLog</h1>
                <div class="header-controls">
                    <button id="themeToggle" class="btn-theme-toggle" title="라이트/다크 모드 전환">
                        <svg id="icon-theme-light" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="1.5" style="display: none;">
                            <circle cx="12" cy="12" r="5" />
                            <line x1="12" y1="1" x2="12" y2="3" />
                            <line x1="12" y1="21" x2="12" y2="23" />
                            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
                            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
                            <line x1="1" y1="12" x2="3" y2="12" />
                            <line x1="21" y1="12" x2="23" y2="12" />
                            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
                            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
                        </svg>
                        <svg id="icon-theme-dark" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="1.5" style="display: block;">
                            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
                        </svg>
                    </button>
                    <button id="soundToggle" class="btn-sound-toggle" title="빗소리 켜기/끄기">
                        <svg id="icon-sound-off" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="1.5" style="display: block;">
                            <path d="M11 5L6 9H2v6h4l5 4V5z" />
                            <line x1="23" y1="9" x2="17" y2="15" />
                            <line x1="17" y1="9" x2="23" y2="15" />
                        </svg>
                        <svg id="icon-sound-on" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="1.5" style="display: none;">
                            <path d="M11 5L6 9H2v6h4l5 4V5z" />
                            <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07" />
                        </svg>
                    </button>
                    <button id="creditToggle" class="btn-credit-toggle" title="크레딧 보기">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
                            <circle cx="9" cy="7" r="4" />
                            <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
                            <path d="M16 3.13a4 4 0 0 1 0 7.75" />
                        </svg>
                    </button>
                </div>
                <div class="header-decoration"></div>
            </header>

            <div class="tab-content active">
                <div class="section-title">
                    <h2>Library</h2>
                    <span class="deco-line"></span>
                </div>
                <div id="chapterList" class="cards-list"></div>
                <button id="addArchive" class="btn-accent full-width" style="margin-top: 16px;">+ NEW ARCHIVE</button>
            </div>
        </div>

        <!-- 미리보기 패널 (리더) -->
        <div class="preview-panel">
            <div class="preview-header">
                <div style="display:flex; align-items:center; gap:12px;">
                    <h2 id="readerTitle">Description</h2>
                    <button id="editSelectedChapter" class="btn-ghost library-edit-button" style="display: none;">작품 편집</button>
                </div>
                <div class="library-reader-actions">
                    <button id="readSelectedChapter" class="btn-edit-page" style="display: none;">읽기</button>
                </div>
            </div>
            <div id="readerContent" class="preview-content library-reader-content"></div>
        </div>

        <!-- 모바일용 프리뷰 토글 버튼 -->
        <button id="togglePreview" class="btn-toggle-preview" title="미리보기 보기">
            <svg id="icon-preview-eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                style="display: block;">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
            </svg>
            <svg id="icon-preview-edit" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                style="display: none;">
                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
            </svg>
        </button>
    </div>

    <div id="creditModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>CREDITS & REFERENCE</h2>
                <span class="close-credit">&times;</span>
            </div>
            <div class="modal-body">
                <div class="credit-list">
                    <div class="credit-item">
                        <span class="credit-role">INSPIRED BY</span>
                        <a href="https://arca.live/b/characterai/143509698" target="_blank" class="credit-link">Viewer Extension</a>
                        <a href="https://arca.live/b/characterai/151793818" target="_blank" class="credit-link">LOG ATELIER WEB</a>
                        <a href="https://arca.live/b/characterai/120217477" target="_blank" class="credit-link">Log Generator Pro 1.1</a>
                        <a href="https://arca.live/b/characterai/157048976" target="_blank" class="credit-link">Log Studio</a>
                        <a href="https://arca.live/b/characterai/159949150" target="_blank" class="credit-link">Logs of Glenna</a>
                        <a href="https://arca.live/b/characterai/161701867" target="_blank" class="credit-link">소개글 좆간지나게 작성하는 법</a>
                    </div>
                    <div class="credit-item">
                        <span class="credit-role">ASSETS</span>
                        <a href="https://pixabay.com/ko/sound-effects/%ec%9e%90%ec%97%b0-rain-sound-and-forest-and-nature-sounds-18259/"
                            target="_blank" class="credit-link">Pixabay: Rain Sound and Forest and Nature Sounds</a>
                        <a href="https://arca.live/b/characterai/154605913" target="_blank" class="credit-link">4.5F) 얼헌 애니 스샷 그림체 공유</a>
                    </div>
                    <div class="credit-item">
                        <span class="credit-role">SPECIAL THANKS</span>
                        <span class="credit-text"><a href="https://arca.live/b/characterai" target="_blank"
                                class="credit-link">아카라이브 AI 채팅 채널</a></span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="notification" class="notification"></div>
    <audio id="rainAudio" loop>
        <source src="rain-sound-and-forest-and-nature-sounds-18259.mp3" type="audio/mpeg">
    </audio>
    <script src="library.js"></script>
</body>

</html>
